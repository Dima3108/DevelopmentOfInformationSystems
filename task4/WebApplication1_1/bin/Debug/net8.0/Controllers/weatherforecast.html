<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <form action="\weatherforecast\savedata" method="post">
        <div>
            Ключ
        </div>
        <div>
            <input type="text" name="inpname" />
        </div>
        <div >
            Значение
        </div>
        <div>
            <input type="text" name="inpvalue"/>
        </div>
        <button type="submit">
            Отправить
        </button>
    </form>
    <div id="content">
        <ul id="usData">

        </ul>
    </div>
    <script defer>
        function UpdateData() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'getalldata');
            xhr.onload = () => {
                if (xhr.status == 200) {
                    var data_ = JSON.parse(xhr.response);
                    var content_ = document.getElementById("usData");
                    for (var i = 0; i < data_.length; i++) {
                        let f = "<li>";
                        f += "<details> <summary>";
                        f += data_[i].token;
                        f += "</summary>";
                        f += data_[i].value;
                        f += "</details>";
                        f += "</li>";
                        content_.innerHTML += f;
                    }
                }
            };
            xhr.send();
        }
        UpdateData();
    </script>
</body>

</html>
